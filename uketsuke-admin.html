<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受付記録 管理画面 | おおやけの里</title>
<style>
  :root{
    --ink:#1c2b3a; --sub:#5a6b7b; --bg:#eef2f6; --card:#fff; --line:#d7dfe7;
    --menkai:#2e7d5b; --gyosha:#2b5fa3; --nyusho:#b95f22; --eigyo:#7b4fa0; --danger:#b3382e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic Medium","Yu Gothic","Meiryo",sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6;padding-bottom:40px;}
  header{background:var(--card);border-bottom:1px solid var(--line);padding:14px 24px;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  header h1{font-size:18px;}
  header h1 small{display:block;font-size:11px;color:var(--sub);font-weight:400;letter-spacing:.1em;}
  .gear{background:none;border:1px solid var(--line);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--sub);}
  .wrap{max-width:1100px;margin:0 auto;padding:20px 16px;}

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;}
  .toolbar .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff;}
  .toolbar .seg button{border:none;background:#fff;padding:8px 14px;cursor:pointer;font-size:14px;color:var(--sub);}
  .toolbar .seg button.on{background:var(--ink);color:#fff;}
  .toolbar input[type=date]{padding:7px 8px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  .toolbar input[type=search]{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;min-width:220px;}
  .toolbar .load{background:var(--gyosha);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-weight:700;cursor:pointer;}
  .toolbar .csv{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 14px;cursor:pointer;color:var(--sub);}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
  .kpi{background:var(--card);border-radius:12px;padding:14px 16px;border-top:4px solid var(--line);}
  .kpi .n{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;}
  .kpi .l{font-size:12px;color:var(--sub);}
  .kpi.total{border-top-color:var(--ink);}
  .kpi.menkai{border-top-color:var(--menkai);}
  .kpi.gyosha{border-top-color:var(--gyosha);}
  .kpi.nyusho{border-top-color:var(--nyusho);}
  .kpi.eigyo{border-top-color:var(--eigyo);}
  .kpi.flag{border-top-color:var(--danger);}
  .kpi.flag .n{color:var(--danger);}

  .panel{background:var(--card);border-radius:12px;padding:16px;margin-bottom:16px;}
  .panel h2{font-size:14px;color:var(--sub);margin-bottom:12px;font-weight:700;}
  .bars{display:flex;align-items:flex-end;gap:4px;height:120px;}
  .bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;min-width:0;}
  .bar .col{width:100%;max-width:34px;background:var(--gyosha);border-radius:4px 4px 0 0;min-height:2px;}
  .bar .v{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums;}
  .bar .d{font-size:10px;color:var(--sub);white-space:nowrap;}
  .mini{width:100%;border-collapse:collapse;font-size:13px;}
  .mini th,.mini td{padding:6px 8px;border-bottom:1px solid rgba(0,0,0,.08);text-align:right;font-variant-numeric:tabular-nums;}
  .mini th:first-child,.mini td:first-child{text-align:left;white-space:nowrap;}
  .mini thead th{color:var(--sub);font-weight:700;}
  .mini tr.tot td{font-weight:700;background:rgba(0,0,0,.03);}
  .ebar{display:flex;align-items:center;gap:10px;margin:5px 0;}
  .ebar .lb{width:160px;font-size:13px;flex:none;}
  .ebar .tr{flex:1;background:rgba(0,0,0,.06);border-radius:6px;height:16px;overflow:hidden;}
  .ebar .fl{height:100%;background:var(--eigyo);border-radius:6px;}
  .ebar .fl.mk{background:var(--menkai);}
  .ebar .n{width:44px;font-size:12px;color:var(--sub);text-align:right;font-variant-numeric:tabular-nums;flex:none;}

  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;}
  th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:13.5px;white-space:nowrap;}
  th{background:#f5f8fb;color:var(--sub);font-size:12px;position:sticky;top:0;}
  .tag{display:inline-block;padding:2px 10px;border-radius:999px;color:#fff;font-size:12px;font-weight:700;}
  .tag.menkai{background:var(--menkai);} .tag.gyosha{background:var(--gyosha);} .tag.nyusho{background:var(--nyusho);} .tag.eigyo{background:var(--eigyo);}
  .flagcell{color:var(--danger);font-weight:800;}
  .table-scroll{overflow-x:auto;border-radius:12px;box-shadow:0 1px 4px rgba(28,43,58,.06);}
  #status{margin:10px 2px;color:var(--sub);font-size:13px;}
  .empty{padding:30px;text-align:center;color:var(--sub);}

  .modal-bg{position:fixed;inset:0;background:rgba(28,43,58,.5);display:none;align-items:center;justify-content:center;z-index:50;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:24px;width:min(520px,92vw);}
  .modal h3{font-size:16px;margin-bottom:12px;}
  .modal label{font-size:12px;font-weight:700;color:var(--sub);}
  .modal input{width:100%;font-size:14px;padding:9px;border:1px solid var(--line);border-radius:8px;margin:4px 0 12px;}
  .modal .row{display:flex;gap:8px;}
  .modal button{flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;border:none;cursor:pointer;}
  .modal .save{background:var(--ink);color:#fff;} .modal .close{background:#eee;}
</style>
</head>

  <h1>受付記録 管理画面<small>介護老人保健施設おおやけの里｜支え合うすべての人への愛と思いやり</small></h1>
  <button class="gear" onclick="openSettings()">接続設定</button>
</header>

<div class="wrap">

  <div class="toolbar">
    <div class="seg" id="period-seg">
      <button data-p="today" class="on">今日</button>
      <button data-p="7">直近7日</button>
      <button data-p="30">直近30日</button>
      <button data-p="month">今月</button>
      <button data-p="pickmonth">月指定</button>
      <button data-p="custom">期間指定</button>
    </div>
    <span id="custom-range" style="display:none">
      <input type="date" id="date-from"> 〜 <input type="date" id="date-to">
    </span>
    <span id="month-range" style="display:none">
      <input type="month" id="month-pick">
    </span>
    <button class="load" onclick="loadRecords()">読み込む</button>
    <input type="search" id="q" placeholder="氏名・会社名・面会相手で絞り込み" oninput="render()">
    <button class="csv" onclick="downloadCsv()">CSVダウンロード</button>
  </div>

  <div class="cards">
    <div class="kpi total"><div class="n" id="k-total">-</div><div class="l">総受付件数</div></div>
    <div class="kpi menkai"><div class="n" id="k-menkai">-</div><div class="l">面会</div></div>
    <div class="kpi gyosha"><div class="n" id="k-gyosha">-</div><div class="l">業者・取引先</div></div>
    <div class="kpi eigyo"><div class="n" id="k-eigyo">-</div><div class="l">営業</div></div>
    <div class="kpi nyusho"><div class="n" id="k-nyusho">-</div><div class="l">入所・見学・相談</div></div>
    <div class="kpi flag"><div class="n" id="k-flag">-</div><div class="l">体調フラグ（要確認）</div></div>
  </div>

  <div class="panel" id="chart-panel" style="display:none">
    <h2>日別の受付件数</h2>
    <div class="bars" id="bars"></div>
  </div>

  <div class="panel" id="eigyo-panel" style="display:none">
    <h2>営業活動の統計（営業先別・月別）</h2>
    <div id="eigyo-summary"></div>
    <div style="overflow-x:auto;margin-top:12px">
      <table class="mini" id="eigyo-table"></table>
    </div>
  </div>

  <div class="panel" id="menkai-panel" style="display:none">
    <h2>面会の統計（フロア別・月別）</h2>

    <div style="overflow-x:auto;margin-top:12px">
      <table class="mini" id="menkai-table"></table>

<div class="modal-bg" id="settings-modal">
  <div class="modal">
    <h3>接続設定</h3>
    <label>GASウェブアプリURL</label>
    <input type="text" id="set-url" placeholder="https://script.google.com/macros/s/…/exec">
    <label>APIキー（GAS側と同じ文字列）</label>
    <input type="text" id="set-key">

      <button class="save" onclick="saveSettings()">保存</button>
      <button class="close" onclick="closeSettings()">閉じる</button>
    </div>
  </div>

<script>
"use strict";
const LS_URL="uketsuke_admin_url", LS_KEY="uketsuke_admin_key";
let all=[]; let period="today";

/* ---------- 期間 ---------- */
document.querySelectorAll("#period-seg button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("#period-seg button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    period=b.dataset.p;
    document.getElementById("custom-range").style.display = period==="custom" ? "inline" : "none";
    document.getElementById("month-range").style.display = period==="pickmonth" ? "inline" : "none";
  };
});
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function rangeParams(){
  const today=new Date();
  if(period==="today") return {from:fmt(today), to:fmt(today)};
  if(period==="7"||period==="30"){
    const f=new Date(today); f.setDate(f.getDate()-(period==="7"?6:29));
    return {from:fmt(f), to:fmt(today)};
  }
  if(period==="month"){
    const f=new Date(today.getFullYear(), today.getMonth(), 1);
    return {from:fmt(f), to:fmt(today)};
  }
  if(period==="pickmonth"){
    const v=document.getElementById("month-pick").value;  // YYYY-MM
    if(!v) return {from:"", to:""};
    const y=+v.slice(0,4), m=+v.slice(5,7);
    return {from:fmt(new Date(y,m-1,1)), to:fmt(new Date(y,m,0))};
  }
  return {from:document.getElementById("date-from").value, to:document.getElementById("date-to").value};
}

/* ---------- 取得 ---------- */
async function loadRecords(){
  const url=localStorage.getItem(LS_URL), key=localStorage.getItem(LS_KEY);
  const st=document.getElementById("status");
  if(!url){ st.textContent="接続設定が未登録です。右上の「接続設定」から登録してください。"; openSettings(); return; }
  const r=rangeParams();
  if(!r.from||!r.to){ st.textContent="期間を指定してください。"; return; }
  st.textContent="読み込み中…";
  try{
    const res=await fetch(url+"?type=records&apiKey="+encodeURIComponent(key||"")+"&from="+r.from+"&to="+r.to);
    const j=await res.json();
    if(j.status!=="ok"){ st.textContent="取得できませんでした（"+(j.message||"不明")+"）。APIキーを確認してください。"; return; }
    all=j.records||[];
    st.textContent=all.length+" 件を取得しました（"+r.from+" 〜 "+r.to+"）";
    render();
  }catch(e){
    st.textContent="接続に失敗しました。URLとGASの公開設定を確認してください。";
  }
}

/* ---------- 表示 ---------- */
function catClass(c){ if(c==="面会")return"menkai"; if(c==="業者・取引先")return"gyosha"; if(c==="営業")return"eigyo"; return"nyusho"; }
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function filtered(){
  const q=document.getElementById("q").value.trim();
  if(!q) return all;
  return all.filter(r=>(r.name+r.company+r.target+r.purpose).includes(q));
}

function render(){
  const list=filtered();
  // KPI
  const cnt=k=>list.filter(r=>r.category===k).length;
  document.getElementById("k-total").textContent=list.length;
  document.getElementById("k-menkai").textContent=cnt("面会");
  document.getElementById("k-gyosha").textContent=cnt("業者・取引先");
  document.getElementById("k-eigyo").textContent=cnt("営業");
  document.getElementById("k-nyusho").textContent=cnt("入所・見学・相談");
  document.getElementById("k-flag").textContent=list.filter(r=>r.flag).length;

  // 日別グラフ（2日分以上あるときのみ）
  const byDay={};
  list.forEach(r=>{const d=r.datetime.slice(0,10); byDay[d]=(byDay[d]||0)+1;});
  const days=Object.keys(byDay).sort();
  const panel=document.getElementById("chart-panel");
  if(days.length>=2){
    panel.style.display="block";
    const max=Math.max(...days.map(d=>byDay[d]),1);
    document.getElementById("bars").innerHTML=days.map(d=>{
      const h=Math.round(byDay[d]/max*90)+8;
      return '<div class="bar"><div class="v">'+byDay[d]+'</div><div class="col" style="height:'+h+'px"></div><div class="d">'+d.slice(5).replace("/","/")+'</div></div>';
    }).join("");
  }else{ panel.style.display="none"; }

  // 営業統計（営業先別 × 月別）
  const EIGYO_DESTS=["入所","居宅介護支援センター","デイケア","ヘルパーステーション","介護予防推進"];
  const eg=list.filter(r=>r.category==="営業");
  const ep=document.getElementById("eigyo-panel");
  if(eg.length>0){
    ep.style.display="block";
    const byDest={};
    eg.forEach(r=>{const d=r.purpose||"（未選択）"; byDest[d]=(byDest[d]||0)+1;});
    const dests=EIGYO_DESTS.filter(d=>d in byDest||true).concat(Object.keys(byDest).filter(d=>EIGYO_DESTS.indexOf(d)<0));
    const maxD=Math.max(...dests.map(d=>byDest[d]||0),1);
    document.getElementById("eigyo-summary").innerHTML=dests.map(d=>
      '<div class="ebar"><div class="lb">'+esc(d)+'</div><div class="tr"><div class="fl" style="width:'+Math.round((byDest[d]||0)/maxD*100)+'%"></div></div><div class="n">'+(byDest[d]||0)+' 件</div></div>').join("");
    const byM={};
    eg.forEach(r=>{const m=r.datetime.slice(0,7); const d=r.purpose||"（未選択）";
      byM[m]=byM[m]||{}; byM[m][d]=(byM[m][d]||0)+1;});
    const months=Object.keys(byM).sort();
    let html='<thead><tr><th>月</th>'+dests.map(d=>'<th>'+esc(d)+'</th>').join('')+'<th>合計</th></tr></thead><tbody>';
    months.forEach(m=>{
      let tot=0;
      html+='<tr><td>'+m.slice(0,4)+'年'+m.slice(5,7)+'月</td>'
        +dests.map(d=>{const v=byM[m][d]||0; tot+=v; return '<td>'+(v||"")+'</td>';}).join('')
        +'<td>'+tot+'</td></tr>';
    });
    let g=0;
    html+='<tr class="tot"><td>合計</td>'+dests.map(d=>{const v=byDest[d]||0; g+=v; return '<td>'+v+'</td>';}).join('')+'<td>'+g+'</td></tr></tbody>';
    document.getElementById("eigyo-table").innerHTML=html;
  }else{ ep.style.display="none"; }

  // 面会統計（フロア別 × 月別）
  const FLOORS=["本館2階","本館3階","本館4階","新館2階","新館3階"];
  const mk=list.filter(r=>r.category==="面会");
  const mp=document.getElementById("menkai-panel");
  if(mk.length>0){
    mp.style.display="block";
    const byF={};
    mk.forEach(r=>{const f=r.floor||"（未選択）"; byF[f]=(byF[f]||0)+1;});
    const floors=FLOORS.concat(Object.keys(byF).filter(f=>FLOORS.indexOf(f)<0));
    const maxF=Math.max(...floors.map(f=>byF[f]||0),1);
    document.getElementById("menkai-summary").innerHTML=floors.map(f=>
      '<div class="ebar"><div class="lb">'+esc(f)+'</div><div class="tr"><div class="fl mk" style="width:'+Math.round((byF[f]||0)/maxF*100)+'%"></div></div><div class="n">'+(byF[f]||0)+' 件</div></div>').join("");
    const byMF={};
    mk.forEach(r=>{const m=r.datetime.slice(0,7); const f=r.floor||"（未選択）";
      byMF[m]=byMF[m]||{}; byMF[m][f]=(byMF[m][f]||0)+1;});
    const monthsF=Object.keys(byMF).sort();
    let htmlF='<thead><tr><th>月</th>'+floors.map(f=>'<th>'+esc(f)+'</th>').join('')+'<th>合計</th></tr></thead><tbody>';
    monthsF.forEach(m=>{
      let tot=0;
      htmlF+='<tr><td>'+m.slice(0,4)+'年'+m.slice(5,7)+'月</td>'
        +floors.map(f=>{const v=byMF[m][f]||0; tot+=v; return '<td>'+(v||"")+'</td>';}).join('')
        +'<td>'+tot+'</td></tr>';
    });
    let gF=0;
    htmlF+='<tr class="tot"><td>合計</td>'+floors.map(f=>{const v=byF[f]||0; gF+=v; return '<td>'+v+'</td>';}).join('')+'<td>'+gF+'</td></tr></tbody>';
    document.getElementById("menkai-table").innerHTML=htmlF;
  }else{ mp.style.display="none"; }

  // 表（新しい順）
  const tbody=document.getElementById("tbody");
  if(list.length===0){ tbody.innerHTML='<tr><td colspan="11" class="empty">該当する記録がありません</td></tr>'; return; }
  tbody.innerHTML=[...list].reverse().map(r=>
    "<tr><td>"+esc(r.datetime)+"</td>"+
    '<td><span class="tag '+catClass(r.category)+'">'+esc(r.category)+"</span></td>"+
    "<td>"+esc(r.name)+"</td><td>"+esc(r.company)+"</td><td>"+esc(r.target)+"</td><td>"+esc(r.floor)+"</td>"+
    "<td>"+esc(r.purpose)+"</td><td>"+esc(r.count)+"</td><td>"+esc(r.temp)+"</td>"+
    "<td>"+esc(r.symptom)+"</td><td class='flagcell'>"+esc(r.flag)+"</td></tr>"
  ).join("");
}

/* ---------- CSV ---------- */
function downloadCsv(){
  const list=filtered();
  if(list.length===0){ alert("出力する記録がありません"); return; }
  const head=["受付日時","区分","氏名","会社名","面会相手","フロア","用件・目的","人数","体温","症状","フラグ"];
  const rows=list.map(r=>[r.datetime,r.category,r.name,r.company,r.target,r.floor,r.purpose,r.count,r.temp,r.symptom,r.flag]);
  const csv=[head,...rows].map(row=>row.map(v=>'"'+String(v??"").replace(/"/g,'""')+'"').join(",")).join("\r\n");
  const blob=new Blob([new Uint8Array([0xEF,0xBB,0xBF]),csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="受付記録_"+fmt(new Date())+".csv";
  a.click();
}

/* ---------- 設定 ---------- */
function openSettings(){
  document.getElementById("set-url").value=localStorage.getItem(LS_URL)||"";
  document.getElementById("set-key").value=localStorage.getItem(LS_KEY)||"";
  document.getElementById("settings-modal").classList.add("show");
}
function closeSettings(){document.getElementById("settings-modal").classList.remove("show");}
function saveSettings(){
  localStorage.setItem(LS_URL,document.getElementById("set-url").value.trim());
  localStorage.setItem(LS_KEY,document.getElementById("set-key").value.trim());
  closeSettings();
}
</script>
